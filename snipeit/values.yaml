replicaCount: 1
revisionHistoryLimit: 0
deploymentStrategy:
  type: RollingUpdate

## PodDisruptionBudget
## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget
# maxUnavailable: 1

image:
  repository: snipe/snipe-it
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v8.3.1"

service:
  type: ClusterIP
  annotations: {}

config:
  mariadb:
  ## All of these values are only used when mysql.enabled is set to false
    externalDatabase: {}
      # user: "snipe-it"
      # pass: "pass"
      # name: snipeit-db
      # host: snipeit-mariadb
      # port: 3306

  snipeit:
    env: production
    debug: false
    url: https://snipeit.homelab.com
    key: "base64:l42tajVREklFSB6GoBdRSa8772oc911TM41JIL7QSM4="
    timezone: Europe/Prague
    locale: en
    envConfig: 
      #mail configuration   
      # MAIL_MAILER: smtp
      # MAIL_HOST: 
      # MAIL_PORT: 25
      # MAIL_ENCRYPTION: null
      # MAIL_FROM_ADDR:
      # MAIL_FROM_NAME: 
      # MAIL_REPLYTO_ADDR: 
      # MAIL_REPLYTO_NAME: 
      # MAIL_AUTO_EMBED: true
      # MAIL_AUTO_EMBED_METHOD: base64
      # MAIL_TLS_VERIFY_PEER: false
