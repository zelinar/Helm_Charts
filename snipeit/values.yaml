       LOG: daily
       APP_LOG_MAX_FILES: 7
       LOG_LEVEL: debug
       LOG_CHANNEL: stack

  externalSecrets: ""

mariadb:
  ## Whether to deploy a mysql server to satisfy the applications database requirements. To use an external database set this to false and configure the externalDatabase parameters
  enabled: true
  ## Create a database and a database user
  ##
  auth:
    enabled: true
    existingSecret: ""
    username: snipeit
    database: snipeit-db
    password: asdljhafljhas769SADaighnks87394gfsdfkajdsds

  persistence:
    enabled: true
    accessModes: 
      - ReadWriteOnce
    size: 8Gi

persistence:
  enabled: true
  annotations: {}
  accessMode: ReadWriteOnce
  existingClaim: ""
  size: 4Gi

  www:
    mountPath: /var/lib/snipeit
    subPath: www
  sessions:
    mountPath: /var/www/html/storage/framework/sessions
    subPath: sessions
     

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  path: /
  pathType: ImplementationSpecific
  hosts:
    - snipeit.homelab.com
