apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-tls
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/zelinar/Helm_Charts
    path: helm_charts/core_services/homelab-tls
    targetRevision: master
    helm:
      dependencyUpdate: true
      ignoreMissingValueFiles: true
      valueFiles:
        - values.yaml
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  