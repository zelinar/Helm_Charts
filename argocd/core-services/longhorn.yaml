apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/zelinar/Helm_Charts
    path: core_services/longhorn
    targetRevision: master
    helm:
      valueFiles:
        - values.yaml
  destination:
    namespace: longhorn-system
    server: https://kubernetes.default.svc