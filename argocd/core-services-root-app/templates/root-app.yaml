apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-services-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zelinar/Helm_Charts
    targetRevision: master
    path: argocd/core-services
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true