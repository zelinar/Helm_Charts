apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ui
  namespace: argocd
spec:
  ingressClassName: traefik-lb
  tls:
    - hosts:
        - argocd-mngmt.homelab.com
      #secretName: wildcard-local-tls
  rules:
    - host: argocd-mngmt.homelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80