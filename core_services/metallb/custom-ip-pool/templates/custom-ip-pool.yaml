apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.metallb.addressPool.poolName }}
  namespace: {{ .Values.metallb.addressPool.namespace }}
spec:
  addresses:
    - {{ .Values.metallb.addressPool.startIP }}-{{ .Values.metallb.addressPool.endIP }}

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.metallb.addressPool.poolName }}-l2
  namespace: {{ .Values.metallb.addressPool.namespace }}
spec: {}  